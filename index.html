<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080810">
<title>DJ Recap</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230d0d1a'/%3E%3Ccircle cx='50' cy='50' r='32' fill='none' stroke='%237c5cfc' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='18' fill='%237c5cfc'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%230d0d1a'/%3E%3Ccircle cx='50' cy='50' r='2.5' fill='%2300d4ff'/%3E%3C/svg%3E">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #07051a; --bg2: #0d0b2e; --bg3: #13103a;
  --accent: #a78bfa; --cyan: #38bdf8; --pink: #f472b6; --gold: #fbbf24; --green: #34d399;
  --text: rgba(255,255,255,0.92); --text2: rgba(255,255,255,0.45); --text3: rgba(255,255,255,0.2);
  --radius: 16px; --radius-sm: 12px;
}

* { box-sizing: border-box; margin:0; padding:0; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Raleway',sans-serif; overflow:hidden; }

.screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
.screen.active { display:flex; }
.scroll-area { flex:1; overflow-y:auto; padding:0 16px 100px; }

.topbar { padding:14px 18px 12px; display:flex; align-items:center; justify-content:space-between; background:rgba(7,5,26,0.8); border-bottom:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(20px); }
.btn { padding:13px 20px; border-radius:12px; border:none; font-weight:600; width:100%; cursor:pointer; }
.btn-primary { background:var(--accent); color:#07051a; }
.btn-gold { background:linear-gradient(135deg,#fbbf24,#f59e0b); color:#1a0500; }
.limit-banner { background:rgba(251,191,36,0.07); border:1px solid rgba(251,191,36,0.2); border-radius:12px; padding:14px; margin:10px 0; display:flex; gap:12px; align-items:center; }
</style>
</head>
<body>
<div id="app">

<!-- ==================== AUTH ==================== -->
<div class="screen active" id="screen-auth">
  <div style="text-align:center;padding:40px 20px">
    <h1 style="font-size:42px;margin-bottom:8px">DJ RECAP</h1>
    <p style="color:#888">Ton carnet de bord de DJ</p>
  </div>
  <div style="padding:0 24px">
    <div style="background:rgba(255,255,255,0.05);border-radius:20px;padding:28px">
      <div style="display:flex;margin-bottom:20px;background:rgba(255,255,255,0.08);border-radius:10px;padding:4px">
        <button onclick="switchAuth('login')" id="tab-login" class="auth-tab active" style="flex:1;padding:10px;border-radius:8px;border:none;background:none">Connexion</button>
        <button onclick="switchAuth('signup')" id="tab-signup" class="auth-tab" style="flex:1;padding:10px;border-radius:8px;border:none;background:none">Inscription</button>
      </div>
      <div id="auth-form-login">
        <input type="email" id="login-email" placeholder="Email" style="width:100%;padding:14px;margin-bottom:12px;background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:white">
        <input type="password" id="login-pw" placeholder="Mot de passe" style="width:100%;padding:14px;margin-bottom:20px;background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:white">
        <button onclick="doLogin()" class="btn btn-primary">Se connecter</button>
      </div>
      <div id="auth-form-signup" style="display:none">
        <input type="text" id="signup-name" placeholder="Nom de DJ" style="width:100%;padding:14px;margin-bottom:12px;background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:white">
        <input type="email" id="signup-email" placeholder="Email" style="width:100%;padding:14px;margin-bottom:12px;background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:white">
        <input type="password" id="signup-pw" placeholder="Mot de passe (min 6)" style="width:100%;padding:14px;margin-bottom:20px;background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:white">
        <button onclick="doSignup()" class="btn btn-primary">Créer mon compte</button>
      </div>
      <div id="auth-error" style="color:#ff6b6b;text-align:center;margin-top:12px;font-size:13px;display:none"></div>
    </div>
  </div>
</div>

<!-- ==================== HOME ==================== -->
<div class="screen" id="screen-home">
  <div class="topbar">
    <div style="font-weight:800">DJ RECAP</div>
    <div id="plan-btn" class="plan-badge plan-free" onclick="goTo('premium')">FREE</div>
  </div>
  <div class="scroll-area">
    <div style="padding:20px 0">
      <h2 id="home-djname" style="font-size:24px;margin-bottom:4px">–</h2>
      <div id="home-stats" style="display:flex;justify-content:space-around;margin:20px 0">
        <div style="text-align:center"><div id="s-total" style="font-size:28px;font-weight:700;color:var(--accent)">0</div><div style="font-size:12px;color:#888">Prestations</div></div>
        <div style="text-align:center"><div id="s-maries" style="font-size:28px;font-weight:700;color:var(--accent)">0</div><div style="font-size:12px;color:#888">Mariages</div></div>
        <div style="text-align:center"><div id="s-avg" style="font-size:28px;font-weight:700;color:var(--accent)">–</div><div style="font-size:12px;color:#888">Note moy.</div></div>
      </div>
    </div>

    <div id="limit-banner-home"></div>

    <div id="events-list" style="margin-top:10px">
      <div style="text-align:center;padding:40px;color:#666">Chargement...</div>
    </div>
  </div>
  <button onclick="openNew()" style="position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#000;font-size:28px;border:none;box-shadow:0 4px 20px rgba(167,139,250,0.4)">+</button>
</div>

<!-- ==================== NOUVELLE SOIRÉE ==================== -->
<div class="screen" id="screen-new">
  <div class="topbar">
    <button onclick="goTo('home')" style="background:none;border:none;color:#aaa">← Retour</button>
    <div id="new-title" style="font-weight:700">Nouvelle soirée</div>
  </div>
  <div class="scroll-area">
    <div id="new-limit-warn"></div>

    <!-- Ton formulaire original ici (je l’ai gardé tel quel pour ne pas tout casser) -->
    <!-- ... Colle ici tout ton formulaire de nouvelle soirée (f-type, f-lieu, etc.) ... -->

    <button onclick="saveCurrentEvent()" class="btn btn-primary" style="margin:20px 0">💾 Enregistrer la soirée</button>
  </div>
</div>

<!-- Les autres écrans (detail, premium, profile, etc.) restent identiques à ta version originale -->

</div>

<script>
// ====================== CONFIG ======================
const FREE_LIMIT = 7;
const FREE_EMAIL_LIMIT = 5;

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCv6IV1VGb2m1Jfnr_p5Sxl5SfIHZG7bgY",
  authDomain: "dj-recap.firebaseapp.com",
  projectId: "dj-recap",
};

let auth, db, currentUser, userDoc = {};
let allEvents = [];
let currentEv = null;
let isEditing = false;
let editingId = null;

// ====================== INIT ======================
firebase.initializeApp(FIREBASE_CONFIG);
auth = firebase.auth();
db = firebase.firestore();

auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    await loadUserDoc();
    showApp();
    loadEvents();
  } else {
    hideApp();
  }
});

// ====================== FREEMIUM ======================
function canAddEvent() {
  return userDoc.plan === 'premium' || allEvents.length < FREE_LIMIT;
}

function canSendEmail() {
  const month = new Date().toISOString().slice(0,7);
  if (userDoc.emailMonthReset !== month) {
    userDoc.emailsSentThisMonth = 0;
    userDoc.emailMonthReset = month;
  }
  return userDoc.plan === 'premium' || (userDoc.emailsSentThisMonth || 0) < FREE_EMAIL_LIMIT;
}

function renderLimitBanner() {
  const el = document.getElementById('limit-banner-home');
  if (!el) return;
  if (userDoc.plan === 'premium') {
    el.innerHTML = '';
    return;
  }

  const remaining = FREE_LIMIT - allEvents.length;
  if (remaining <= 0) {
    el.innerHTML = `<div class="limit-banner"><strong>Limite atteinte</strong><br>Passe Premium pour illimité</div><button onclick="goTo('premium')" class="btn btn-gold">Passer Premium</button>`;
  } else if (remaining <= 2) {
    el.innerHTML = `<div class="limit-banner">Plus que ${remaining} soirée${remaining>1?'s':''} gratuite${remaining>1?'s':''}</div>`;
  } else {
    el.innerHTML = '';
  }
}

// ====================== NAVIGATION ======================
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
}

// ====================== AUTRES FONCTIONS ======================
// (auth, loadEvents, saveEvent, openNew, openEditEvent, etc.)

// Pour l'instant, je mets un placeholder. On va les compléter dans les prochaines étapes.

function toast(msg) {
  alert(msg); // Temporaire - on améliorera plus tard
}

// ====================== START ======================
function showApp() { /* à compléter */ }
function hideApp() { /* à compléter */ }
async function loadUserDoc() { /* à compléter */ }
async function loadEvents() { /* à compléter */ }

console.log("DJ Recap - Version améliorée chargée");
</script>
</body>
</html>
