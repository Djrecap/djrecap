<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080810">
<title>DJ Recap</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #07051a;
  --accent: #a78bfa;
  --cyan: #38bdf8;
  --pink: #f472b6;
  --gold: #fbbf24;
  --text: rgba(255,255,255,0.92);
  --text2: rgba(255,255,255,0.45);
  --radius: 16px;
}

* { box-sizing: border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Raleway',sans-serif; height:100vh; overflow:hidden; }

.screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
.screen.active { display:flex; }

.scroll-area { flex:1; overflow-y:auto; padding:0 16px 80px; }

.topbar { padding:14px 18px; display:flex; align-items:center; justify-content:space-between; background:rgba(7,5,26,0.9); border-bottom:1px solid rgba(255,255,255,0.1); }
.btn { padding:14px; border-radius:12px; border:none; font-weight:600; width:100%; cursor:pointer; margin:10px 0; }
.btn-primary { background:var(--accent); color:#000; }
.btn-gold { background:var(--gold); color:#000; }

.limit-banner { 
  background:rgba(251,191,36,0.1); 
  border:1px solid var(--gold); 
  border-radius:var(--radius); 
  padding:14px; 
  margin:12px 0; 
}
</style>
</head>
<body>
<div id="app">

<!-- AUTH -->
<div class="screen active" id="screen-auth">
  <div style="padding:40px 20px;text-align:center">
    <h1 style="font-size:42px;color:var(--accent)">DJ RECAP</h1>
    <p style="color:var(--text2)">Ton carnet de bord de DJ</p>
  </div>
  <div style="padding:0 20px">
    <div style="background:rgba(255,255,255,0.05);border-radius:20px;padding:25px">
      <div style="display:flex;gap:8px;margin-bottom:20px">
        <button id="tab-login" onclick="switchAuth('login')" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#000;font-weight:600">Connexion</button>
        <button id="tab-signup" onclick="switchAuth('signup')" style="flex:1;padding:12px;border-radius:10px;border:none;background:rgba(255,255,255,0.1);color:white">Inscription</button>
      </div>

      <div id="auth-form-login">
        <input type="email" id="login-email" placeholder="Email" style="width:100%;padding:14px;margin-bottom:12px;background:rgba(255,255,255,0.1);border:none;border-radius:10px;color:white">
        <input type="password" id="login-pw" placeholder="Mot de passe" style="width:100%;padding:14px;margin-bottom:20px;background:rgba(255,255,255,0.1);border:none;border-radius:10px;color:white">
        <button onclick="doLogin()" class="btn btn-primary">Se connecter</button>
      </div>

      <div id="auth-form-signup" style="display:none">
        <input type="text" id="signup-name" placeholder="Nom de DJ" style="width:100%;padding:14px;margin-bottom:12px;background:rgba(255,255,255,0.1);border:none;border-radius:10px;color:white">
        <input type="email" id="signup-email" placeholder="Email" style="width:100%;padding:14px;margin-bottom:12px;background:rgba(255,255,255,0.1);border:none;border-radius:10px;color:white">
        <input type="password" id="signup-pw" placeholder="Mot de passe" style="width:100%;padding:14px;margin-bottom:20px;background:rgba(255,255,255,0.1);border:none;border-radius:10px;color:white">
        <button onclick="doSignup()" class="btn btn-primary">Créer mon compte</button>
      </div>

      <div id="auth-error" style="color:#ff6b6b;text-align:center;margin-top:15px;display:none"></div>
    </div>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="screen-home">
  <div class="topbar">
    <div style="font-weight:800">DJ RECAP</div>
    <div id="plan-btn" onclick="goTo('premium')">FREE</div>
  </div>
  <div class="scroll-area">
    <div style="padding:20px">
      <h2 id="home-djname" style="margin:0 0 20px 0">DJ</h2>
      <div id="limit-banner-home"></div>
      <div id="events-list">Chargement des soirées...</div>
    </div>
  </div>
  <button onclick="openNew()" style="position:fixed;bottom:90px;right:20px;width:60px;height:60px;background:var(--accent);color:black;border:none;border-radius:50%;font-size:30px;box-shadow:0 4px 15px rgba(0,0,0,0.3)">+</button>
</div>

<script>
// ====================== CONFIG ======================
const FREE_LIMIT = 7;
const FREE_EMAIL_LIMIT = 5;

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCv6IV1VGb2m1Jfnr_p5Sxl5SfIHZG7bgY",
  authDomain: "dj-recap.firebaseapp.com",
  projectId: "dj-recap",
};

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let userDoc = {};
let allEvents = [];

// ====================== AUTH ======================
function switchAuth(tab) {
  document.getElementById('auth-form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('auth-form-signup').style.display = tab === 'signup' ? 'block' : 'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errorEl = document.getElementById('auth-error');

  try {
    await auth.signInWithEmailAndPassword(email, pw);
  } catch (e) {
    errorEl.textContent = "Email ou mot de passe incorrect";
    errorEl.style.display = 'block';
  }
}

async function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pw = document.getElementById('signup-pw').value;
  const errorEl = document.getElementById('auth-error');

  if (!name) {
    errorEl.textContent = "Veuillez entrer un nom de DJ";
    errorEl.style.display = 'block';
    return;
  }

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pw);
    await cred.user.updateProfile({ displayName: name });
  } catch (e) {
    errorEl.textContent = "Erreur lors de la création du compte";
    errorEl.style.display = 'block';
  }
}

// ====================== APP ======================
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    await loadUserDoc();
    document.getElementById('screen-auth').classList.remove('active');
    document.getElementById('screen-home').classList.add('active');
    loadEvents();
  }
});

async function loadUserDoc() {
  const ref = db.collection('users').doc(currentUser.uid);
  const snap = await ref.get();
  if (snap.exists) {
    userDoc = snap.data();
  } else {
    userDoc = { djName: currentUser.displayName || "DJ", plan: "free" };
    await ref.set(userDoc);
  }
  document.getElementById('home-djname').textContent = userDoc.djName || "DJ";
}

async function loadEvents() {
  const snap = await db.collection('events').where('uid','==', currentUser.uid).get();
  allEvents = snap.docs.map(d => ({id: d.id, ...d.data()}));
  allEvents.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

  let html = '';
  allEvents.forEach(ev => {
    html += `<div style="background:rgba(255,255,255,0.06);padding:15px;border-radius:12px;margin-bottom:10px" onclick="alert('Soirée : ${ev.lieu || "Sans nom"}')">
      <strong>${ev.lieu || "Événement"}</strong><br>
      <small>${ev.date || ""} - ${ev.type || ""}</small>
    </div>`;
  });

  document.getElementById('events-list').innerHTML = html || "<p style='text-align:center;color:#666'>Aucune soirée enregistrée</p>";
}

function openNew() {
  if (allEvents.length >= FREE_LIMIT && userDoc.plan !== 'premium') {
    alert("Vous avez atteint la limite de 7 soirées gratuites.\n\nPassez en Premium pour continuer.");
    return;
  }
  alert("Formulaire nouvelle soirée - À développer");
}

function goTo(screen) {
  // Pour l'instant on ne fait rien de plus
  console.log("Aller vers :", screen);
}
</script>
</body>
</html>
